<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발주왕</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#12211c;--paper:#f6f4ec;--card:#fff;--green:#1f7a4d;--line:#dcd8cb;--muted:#6b7169;
--shadow:0 1px 0 rgba(0,0,0,.04),0 8px 24px -18px rgba(18,33,28,.45)}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);
font-family:"Noto Sans KR",sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:16px}
.box{width:100%;max-width:380px}
h1{font-family:"Archivo";font-size:30px;margin:0 0 4px;text-align:center}
.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:22px}
input{width:100%;font:inherit;font-size:16px;border:1px solid var(--line);border-radius:12px;
padding:13px;background:#fff;margin-bottom:10px}
input:focus{outline:2px solid var(--green)}
.btn{width:100%;border:none;border-radius:12px;padding:15px;font-family:"Archivo";font-weight:700;
font-size:16px;background:var(--green);color:#fff;cursor:pointer;box-shadow:var(--shadow)}
.menu{display:none;flex-direction:column;gap:10px}
.menu a{display:block;background:var(--card);border:1px solid var(--line);border-radius:14px;
padding:18px;text-decoration:none;color:var(--ink);font-weight:700;font-size:17px;box-shadow:var(--shadow)}
.menu a span{display:block;font-size:12px;color:var(--muted);font-weight:400;margin-top:3px}
.err{color:#c23b2b;font-size:13px;text-align:center;margin-top:8px;min-height:18px}
.out{margin-top:14px;text-align:center;font-size:13px;color:var(--muted);cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<div class="box">
  <h1>발주왕</h1>
  <div class="sub">재고·발주 관리</div>
  <div id="login">
    <input id="email" type="email" placeholder="이메일" autocomplete="username">
    <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button class="btn" id="loginBtn">로그인</button>
    <div class="err" id="err"></div>
  </div>
  <div class="menu" id="menu">
    <a href="stock.html">📋 재고조사<span>마감 재고 입력 · 발주 계산</span></a>
    <a href="order.html">🛒 발주하기<span>담기 · 장바구니 · 주문내역</span></a>
    <a href="inbound.html">📦 입고 확인<span>발주분 체크 · 수동 입고</span></a>
    <a href="admin.html">⚙️ 품목 관리<span>품목 추가·수정·대량 등록</span></a>
    <a href="report.html">📊 월간 결산<span>일별 재고·발주 현황 엑셀</span></a>
    <div class="out" id="outBtn">로그아웃</div>
  </div>
</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const sb=createClient("https://uisdezsmyknmwayexhbu.supabase.co","sb_publishable_18Z8F9WYbJkbmFGIumZdKA_f6YGy9po");
const $=s=>document.querySelector(s);
const show=on=>{$("#login").style.display=on?"none":"block";$("#menu").style.display=on?"flex":"none";};
const {data:{session}}=await sb.auth.getSession(); show(!!session);
$("#loginBtn").onclick=async()=>{
  $("#err").textContent="";
  const {error}=await sb.auth.signInWithPassword({email:$("#email").value.trim(),password:$("#pw").value});
  if(error){$("#err").textContent="이메일 또는 비밀번호가 틀렸어요";return;}
  show(true);
};
$("#outBtn").onclick=async()=>{await sb.auth.signOut();show(false);};
fetch("https://baljuking.onrender.com/stores").catch(()=>{}); // 서버 미리 깨우기
</script>
</body>
</html>
