<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>발주왕 · 입고 확인</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#12211c;--paper:#f6f4ec;--card:#fff;--green:#1f7a4d;--green-d:#155f3b;
    --line:#dcd8cb;--muted:#6b7169;--warn:#c23b2b;
    --shadow:0 1px 0 rgba(0,0,0,.04),0 8px 24px -18px rgba(18,33,28,.45)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:"Noto Sans KR",system-ui,sans-serif;padding-bottom:110px}
  .num{font-family:"Archivo","Noto Sans KR";font-variant-numeric:tabular-nums}
  header{position:sticky;top:0;z-index:20;background:var(--ink);color:#eef2ec;padding:12px 14px;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand b{font-family:"Archivo";font-weight:800;font-size:19px}
  .brand span{font-size:12px;color:#9fb3a6}
  .ctrls{display:flex;gap:8px;margin-top:10px}
  .dateinput,.search{background:#1b2f28;color:#eef2ec;border:1px solid #2c463c;border-radius:11px;padding:10px 12px;font-size:15px;font-family:inherit}
  .dateinput{flex:1}
  .search{width:100%;margin-top:8px}
  main{max-width:680px;margin:0 auto;padding:12px}
  h2{font-size:13px;color:var(--muted);letter-spacing:.5px;margin:16px 4px 8px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:12px;margin-bottom:8px}
  .camBtn{width:100%;border:2px dashed var(--line);border-radius:14px;padding:22px;background:#fbfaf5;
    font-size:16px;font-weight:700;color:var(--green-d);cursor:pointer}
  .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .thumb{position:relative;width:84px;height:84px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;width:20px;height:20px;text-align:center;line-height:20px;font-size:12px;cursor:pointer}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:8px;
    box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto;gap:6px 12px;align-items:center}
  .card.filled{border-color:var(--green)}
  .name{font-weight:700;font-size:16px}
  .meta{font-size:12px;color:var(--muted)}
  .qtywrap{display:flex;align-items:center;gap:6px}
  .qty{width:96px;text-align:right;border:1px solid var(--line);border-radius:11px;padding:11px;
    font-size:20px;font-weight:700;background:#fbfaf5}
  .qty:focus{outline:2px solid var(--green)}
  .u{font-size:13px;color:var(--muted);min-width:24px}
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:linear-gradient(180deg,rgba(246,244,236,0),var(--paper) 28%);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom))}
  .bar .inner{max-width:680px;margin:0 auto}
  .btn{width:100%;border:none;border-radius:13px;padding:15px;font-family:"Archivo";font-weight:700;
    font-size:16px;background:var(--green);color:#fff;cursor:pointer;box-shadow:var(--shadow)}
  .btn:disabled{background:#9fb0a6}
  .toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:12px 18px;border-radius:12px;font-size:14px;opacity:0;transition:.25s;z-index:40}
  .toast.show{opacity:1;bottom:120px}
  .toast.err{background:var(--warn)}
  .hint{font-size:12px;color:var(--muted);margin:6px 4px}
  .chip{white-space:nowrap;font-size:13px;padding:6px 12px;border-radius:999px;background:#1b2f28;color:#cfe0d6;border:1px solid #2c463c;cursor:pointer}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green)}
</style>
</head>
<body>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const sbA=createClient("https://uisdezsmyknmwayexhbu.supabase.co","sb_publishable_18Z8F9WYbJkbmFGIumZdKA_f6YGy9po");
const {data:{session}}=await sbA.auth.getSession();
window.sbToken=session?.access_token||null;
if(!session)location.href="index.html";
window.sbAuth=sbA;
</script>

<header>
  <div class="brand"><b>발주왕</b><span>입고 확인</span><a href="index.html" style="color:#9fb3a6;font-size:13px;text-decoration:none;margin-left:auto">🏠 메인</a></div>
  <div class="ctrls"><input class="dateinput" type="date" id="date"></div>
  <input class="search" id="search" placeholder="🔍 품목 검색" autocomplete="off">
  <div class="chips" id="chips" style="display:flex;gap:6px;overflow-x:auto;margin-top:8px"></div>
</header>

<main>
  <h2>① 입고 전표 사진</h2>
  <div class="panel">
    <button class="camBtn" id="camBtn">📷 전표 촬영 / 사진 올리기</button>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-top:8px">
      <input type="checkbox" id="ocrOn" style="width:18px;height:18px;accent-color:var(--green)">
      전표 자동 인식(OCR) 사용 — 유료 기능, 키 설정 시에만 작동</label>
    <input type="file" id="camInput" accept="image/*" multiple style="display:none">
    <div class="thumbs" id="thumbs"></div>
  </div>

  <h2>② 입고 수량 (발주단위 아님, 낱개/재고단위 기준)</h2>
  <div class="hint">어제·오늘 발주 품목이 표시돼요. 저장하면 목록에서 사라져요. 맞으면 "발주대로 입고 ✓" 체크, 다르면 숫자 직접 입력.</div>
  <div style="display:flex;gap:8px;margin:0 0 10px">
    <button class="btn ghost" id="manualBtn" style="flex:1">＋ 수동 입고</button>
    <button class="btn ghost" id="histBtn" style="flex:1">오늘 입고 내역</button>
  </div>
  <div id="items">불러오는 중…</div>
  <div id="histView" style="display:none"></div>
</main>

<div class="bar"><div class="inner">
  <button class="btn" id="saveBtn">입고 저장</button>
</div></div>
<div class="toast" id="toast"></div>

<script>
const API="https://baljuking.onrender.com", STORE=1;
const SB="https://uisdezsmyknmwayexhbu.supabase.co/rest/v1";
const SBKEY="sb_publishable_18Z8F9WYbJkbmFGIumZdKA_f6YGy9po";
async function getToken(){for(let i=0;i<20;i++){if(window.sbToken)return window.sbToken;
  await new Promise(r=>setTimeout(r,250));}return null;}
async function sbFetch(p,opt={}){const t=await getToken();
  return fetch(SB+p,{...opt,headers:{apikey:SBKEY,Authorization:`Bearer ${t||SBKEY}`,
    "Content-Type":"application/json",...(opt.headers||{})}});}
async function bumpDraft(deltas){
  const list=deltas.filter(d=>d.delta);
  if(!list.length)return;
  try{
    const ids=list.map(d=>d.item_id).join(",");
    const r=await sbFetch(`/stock_draft?store_id=eq.${STORE}&date=eq.${$("#date").value}&item_id=in.(${ids})&select=item_id,qty,so`);
    if(!r.ok)return;
    const map=Object.fromEntries((await r.json()).map(x=>[x.item_id,x]));
    const ups=list.filter(d=>map[d.item_id]).map(d=>({store_id:STORE,date:$("#date").value,item_id:d.item_id,
      qty:(parseFloat(map[d.item_id].qty)||0)+d.delta, so:map[d.item_id].so||false}));
    if(ups.length)await sbFetch("/stock_draft?on_conflict=store_id,date,item_id",
      {method:"POST",headers:{Prefer:"resolution=merge-duplicates"},body:JSON.stringify(ups)});
    // 확정 재고(daily_stock)에도 반영 → 잔여 즉시 갱신
    const r2=await sbFetch(`/daily_stock?store_id=eq.${STORE}&date=eq.${$("#date").value}&item_id=in.(${ids})&select=item_id,stock_qty`);
    if(r2.ok){
      const smap=Object.fromEntries((await r2.json()).map(x=>[x.item_id,x]));
      for(const d of list){
        if(!smap[d.item_id])continue;
        await sbFetch(`/daily_stock?store_id=eq.${STORE}&date=eq.${$("#date").value}&item_id=eq.${d.item_id}`,
          {method:"PATCH",body:JSON.stringify({stock_qty:(parseFloat(smap[d.item_id].stock_qty)||0)+d.delta})});
      }
    }
  }catch(e){}
}
const $=s=>document.querySelector(s);
let items=[],filterSup="전체",savedMap=new Map(),itemsAll=[];

function toast(t,e){const el=$("#toast");el.textContent=t;el.className="toast show"+(e?" err":"");
  clearTimeout(el._t);el._t=setTimeout(()=>el.className="toast",2400);}
function today(){return new Date().toISOString().slice(0,10);}
function yesterday(d){const x=new Date(d);x.setDate(x.getDate()-1);return x.toISOString().slice(0,10);}

async function init(){
  $("#date").value=today();
  await load();
}
async function load(){
  const on=$("#date").value;
  try{
    const [its,orders,inb,recs]=await Promise.all([
      fetch(API+"/items").then(r=>r.json()),
      Promise.all([
        fetch(`${API}/orders?store_id=${STORE}&on=${yesterday(on)}`).then(r=>r.json()),
        fetch(`${API}/orders?store_id=${STORE}&on=${on}`).then(r=>r.json())
      ]).then(([a,b])=>[...a.map(o=>({...o,_od:"y"})),...b.map(o=>({...o,_od:"t"}))]),
      Promise.all([
        fetch(`${API}/inbound?store_id=${STORE}&on=${on}`).then(r=>r.json()),
        fetch(`${API}/inbound?store_id=${STORE}&on=${yesterday(on)}`).then(r=>r.json())
      ]),
      fetch(`${API}/receipts?store_id=${STORE}&on=${on}`).then(r=>r.json())
    ]);
    items=its;
    items.sort((a,b)=>(parseFloat(a.location)||9999)-(parseFloat(b.location)||9999));
    const ordered=new Map(orders.map(o=>[o.item_id,o]));   // 오늘 발주가 어제 발주를 덮음
    const saved=new Map(inb[0].map(x=>[x.item_id,x.inbound_qty]));
    const savedY=new Set(inb[1].filter(x=>x.inbound_qty>0).map(x=>x.item_id));
    savedMap=saved; itemsAll=its;
    // 미입고 발주만 표시: 오늘 입고분 제외 + 어제 발주는 어제 입고분도 제외
    const pending=items.filter(i=>{
      const o=ordered.get(i.item_id);
      if(!o||saved.has(i.item_id))return false;
      if(o._od==="y"&&savedY.has(i.item_id))return false;
      return true;
    });
    pending.sort((a,b)=>(parseFloat(a.location)||9999)-(parseFloat(b.location)||9999));
    if(!pending.length){$("#items").innerHTML="<div class='hint' style='padding:16px 0'>입고할 발주 품목이 없어요. 추가로 들어온 건 '수동 입고'로 등록하세요.</div>";}
    else $("#items").innerHTML=pending.map(i=>{
      const o=ordered.get(i.item_id);
      const exp=o? o.order_qty*(i.conversion_qty||1) : null;
      const v=saved.has(i.item_id)?saved.get(i.item_id):"";
      return `<div class="card${v!==""?" filled":""}" data-id="${i.item_id}" data-name="${i.name}" data-sup="${(i.supplier||'미지정').toUpperCase()}" data-exp="${exp??""}">
        <div><div class="name">${i.name}</div>
          <div class="meta">${o?`발주 ${o.order_qty} ${o.order_unit} → 예상 ${exp} ${i.stock_unit}`:"발주 없음"}</div>
          ${o?`<label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--green-d);margin-top:4px">
            <input type="checkbox" class="okChk" ${v!==""&&+v===exp?"checked":""} style="width:19px;height:19px;accent-color:var(--green)">발주대로 입고 ✓</label>`:""}</div>
        <div class="qtywrap"><input class="qty num" inputmode="decimal" placeholder="${exp??"—"}" value="${v}">
          <span class="u">${i.stock_unit}</span></div>
      </div>`;
    }).join("");
    document.querySelectorAll(".card .qty").forEach(q=>q.addEventListener("input",
      e=>{const c=e.target.closest(".card");c.classList.toggle("filled",e.target.value.trim()!=="");
        const k=c.querySelector(".okChk");if(k)k.checked=(+e.target.value===+c.dataset.exp);}));
    document.querySelectorAll(".okChk").forEach(k=>k.addEventListener("change",e=>{
      const c=e.target.closest(".card"), q=c.querySelector(".qty");
      q.value=e.target.checked?c.dataset.exp:"";
      c.classList.toggle("filled",q.value!=="");
    }));
    $("#thumbs").innerHTML=recs.map(r=>`<div class="thumb"><img src="${r.image_url}"><span class="del" onclick="delR(${r.id})">✕</span></div>`).join("");
    const sups=["전체",...new Set(items.map(i=>(i.supplier||"미지정").toUpperCase()))];
    $("#chips").innerHTML=sups.map(s=>`<div class="chip${s===filterSup?" on":""}" data-s="${s}">${s}</div>`).join("");
    $("#chips").querySelectorAll(".chip").forEach(c=>c.onclick=()=>{filterSup=c.dataset.s;
      $("#chips").querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c));applyF();});
    applyF();
  }catch(e){$("#items").innerHTML="서버 연결 실패. 새로고침 해주세요.";}
}
$("#date").onchange=load;
function applyF(){
  const kw=$("#search").value.trim().toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    const okS=filterSup==="전체"||c.dataset.sup===filterSup;
    const okK=!kw||c.dataset.name.toLowerCase().includes(kw);
    c.style.display=(okS&&okK)?"":"none";});
}
$("#search").oninput=applyF;

$("#camBtn").onclick=()=>$("#camInput").click();
$("#camInput").onchange=async e=>{
  for(const f of e.target.files){
    // OCR 시도
    if($("#ocrOn").checked)try{
      toast("전표 읽는 중…");
      const fd2=new FormData();fd2.append("store_id",STORE);fd2.append("file",f);
      const rows=await fetch(API+"/receipt/ocr",{method:"POST",body:fd2}).then(r=>r.json());
      if(rows.length)showConfirm(rows);
      else toast("인식된 품목 없음 — 직접 입력");
    }catch(err){toast("전표 인식 실패 — 직접 입력",1);}
    const fd=new FormData();
    fd.append("store_id",STORE);fd.append("on",$("#date").value);fd.append("file",f);
    try{
      const r=await fetch(API+"/receipt/upload",{method:"POST",body:fd}).then(r=>r.json());
      $("#thumbs").insertAdjacentHTML("beforeend",`<div class="thumb"><img src="${r.url}"></div>`);
    }catch(err){toast("사진 업로드 실패",1);}
  }
  e.target.value="";
};

$("#saveBtn").onclick=async()=>{
  const btn=$("#saveBtn");btn.disabled=true;btn.textContent="저장 중…";
  const lines=[...document.querySelectorAll("#items .card")].map(c=>{
    const q=c.querySelector(".qty");
    if(!q)return null;
    const v=q.value.trim();
    return v===""?null:{item_id:+c.dataset.id,inbound_qty:parseFloat(v)||0};
  }).filter(Boolean);
  if(!lines.length){toast("입력된 입고가 없어요",1);btn.disabled=false;btn.textContent="입고 저장";return;}
  try{
    const r=await fetch(API+"/inbound/save",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({store_id:STORE,date:$("#date").value,lines})}).then(r=>r.json());
    toast(`입고 저장 완료 (${r.saved}품목) · 재고에 반영됨`);
    bumpDraft(lines.map(l=>({item_id:l.item_id,delta:l.inbound_qty})));
    load();
  }catch(e){toast("저장 실패",1);}
  finally{btn.disabled=false;btn.textContent="입고 저장";}
};

// ── 수동 입고 (추가발주·사입) ──
$("#manualBtn").onclick=()=>openManual();
function openManual(){
  let d=document.getElementById("mDlg");if(d)d.remove();
  d=document.createElement("div");d.id="mDlg";
  d.style.cssText="position:fixed;inset:0;background:rgba(18,33,28,.55);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px";
  d.innerHTML=`<div style="background:#fff;border-radius:16px;padding:16px;width:100%;max-width:420px;max-height:85vh;overflow:auto">
    <h3 style="margin:0 0 12px">수동 입고 등록</h3>
    <input id="mSearch" placeholder="🔍 품목 검색" style="width:100%;border:1px solid var(--line);border-radius:10px;padding:11px;font-size:15px;margin-bottom:8px">
    <div id="mList" style="max-height:46vh;overflow:auto"></div>
    <button class="btn ghost" style="width:100%;margin-top:12px" onclick="document.getElementById('mDlg').remove()">닫기</button>
  </div>`;
  document.body.appendChild(d);
  const render=kw=>{
    const list=itemsAll.filter(i=>!kw||i.name.toLowerCase().includes(kw.toLowerCase())).slice(0,40);
    $("#mList").innerHTML=list.map(i=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)">
      <div style="flex:1"><b>${i.name}</b> <span style="color:var(--muted);font-size:12px">${i.stock_unit}</span></div>
      <input class="mQty" data-id="${i.item_id}" inputmode="decimal" placeholder="수량"
        style="width:70px;text-align:right;border:1px solid var(--line);border-radius:8px;padding:8px">
      <button class="btn" style="padding:8px 12px;font-size:14px" onclick="saveManual(${i.item_id},this)">입고</button></div>`).join("");
  };
  render("");
  $("#mSearch").oninput=e=>render(e.target.value);
}
window.saveManual=async(id,btn)=>{
  const inp=btn.parentElement.querySelector(".mQty");
  const q=parseFloat(inp.value);
  if(!q){toast("수량을 입력하세요",1);return;}
  btn.disabled=true;
  try{
    // 기존 오늘 입고분에 합산
    const prev=savedMap.get(id)||0;
    await fetch(API+"/inbound/save",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({store_id:STORE,date:$("#date").value,lines:[{item_id:id,inbound_qty:prev+q}]})});
    toast("수동 입고 등록 완료 · 재고에 반영됨");
    bumpDraft([{item_id:id,delta:q}]);
    inp.value="";btn.disabled=false;
    load();
  }catch(e){toast("등록 실패",1);btn.disabled=false;}
};

// ── 오늘 입고 내역 (수정/삭제) ──
$("#histBtn").onclick=async()=>{
  const showing=$("#histView").style.display!=="none";
  if(showing){$("#histView").style.display="none";$("#items").style.display="";$("#histBtn").textContent="오늘 입고 내역";$("#saveBtn").style.display="";return;}
  const rows=(await fetch(`${API}/inbound?store_id=${STORE}&on=${$("#date").value}`).then(r=>r.json())).filter(r=>r.inbound_qty>0);
  const nm=Object.fromEntries(itemsAll.map(i=>[i.item_id,i]));
  if(!rows.length){$("#histView").innerHTML="<div class='hint' style='padding:16px 0'>오늘 입고된 품목이 없어요.</div>";}
  else $("#histView").innerHTML=rows.map(r=>{const it=nm[r.item_id]||{};
    return `<div class="card"><div><div class="name">${it.name||r.item_id}</div>
      <div class="meta">${it.stock_unit||""}</div></div>
      <div class="qtywrap">
        <input class="hQty num" data-id="${r.item_id}" data-old="${r.inbound_qty}" inputmode="decimal" value="${r.inbound_qty}"
          style="width:80px;text-align:right;border:1px solid var(--line);border-radius:10px;padding:9px">
        <button class="btn" style="padding:9px 12px;font-size:14px" onclick="editInb(${r.item_id},this)">저장</button>
        <button class="btn ghost" style="padding:9px 12px;font-size:14px" onclick="editInb(${r.item_id},this,true)">삭제</button>
      </div></div>`;}).join("");
  $("#histView").style.display="";$("#items").style.display="none";$("#histBtn").textContent="◀ 발주 입고로";
  $("#saveBtn").style.display="none";
};
window.editInb=async(id,btn,del)=>{
  const inp=btn.closest(".qtywrap").querySelector(".hQty");
  const q=del?0:parseFloat(inp.value)||0;
  const delta=q-(parseFloat(inp.dataset.old)||0);
  btn.disabled=true;
  try{
    await fetch(API+"/inbound/save",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({store_id:STORE,date:$("#date").value,lines:[{item_id:id,inbound_qty:q}]})});
    bumpDraft([{item_id:id,delta}]);
    toast(del?"삭제 완료 · 재고에서 차감":"수정 완료 · 재고에 반영");
    await load();
    $("#histView").style.display="none";$("#items").style.display="";$("#histBtn").textContent="오늘 입고 내역";$("#saveBtn").style.display="";
    $("#histBtn").click();
  }catch(e){toast("실패",1);btn.disabled=false;}
};

window.delR=async id=>{if(!confirm("사진 삭제?"))return;
  await fetch(API+"/receipt/"+id,{method:"DELETE"});load();};



// OCR 결과 확인창 (적용 전 검토)
function showConfirm(rows){
  let d=document.getElementById("cfDlg"); if(d)d.remove();
  d=document.createElement("dialog"); d.id="cfDlg";
  d.style.cssText="border:none;border-radius:16px;padding:0;width:min(520px,94vw)";
  d.innerHTML=`<div style="padding:14px;border-bottom:1px solid var(--line);font-weight:700">전표 인식 결과 확인</div>
  <div style="padding:14px;max-height:60vh;overflow:auto;display:flex;flex-direction:column;gap:8px">
  ${rows.map((r,i)=>`<div style="display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:8px">
    <input type="checkbox" class="cfChk" data-i="${i}" ${r.matched?"checked":""} style="width:18px;height:18px;accent-color:var(--green)">
    <div style="flex:1"><b>${r.raw||r.name}</b>
      <div style="font-size:12px;color:${r.matched?"var(--green-d)":"var(--warn)"}">${r.matched?"→ "+r.name:"미매칭 (체크 시 매칭창으로)"}</div></div>
    <input class="cfQty num" data-i="${i}" inputmode="decimal" value="${r.qty}"
      style="width:70px;text-align:right;border:1px solid var(--line);border-radius:8px;padding:8px;font-weight:700">
  </div>`).join("")}
  </div>
  <div style="padding:12px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end">
    <button class="btn" style="width:auto;padding:10px 16px;background:#fff;color:var(--ink);border:1px solid var(--line)" onclick="cfDlg.close()">취소</button>
    <button class="btn" style="width:auto;padding:10px 16px" onclick="applyOcr()">적용</button></div>`;
  document.body.appendChild(d); d._rows=rows; d.showModal();
}
window.applyOcr=async()=>{
  const d=document.getElementById("cfDlg"), rows=d._rows;
  d.querySelectorAll(".cfQty").forEach(el=>rows[+el.dataset.i].qty=parseFloat(el.value)||0);
  const sel=[...d.querySelectorAll(".cfChk")].filter(c=>c.checked).map(c=>rows[+c.dataset.i]);
  let n=0; const un=[];
  const direct=[];
  sel.forEach(r=>{
    if(r.matched){
      const c=document.querySelector(`#items .card[data-id="${r.item_id}"]`);
      if(c){c.querySelector(".qty").value=r.qty;c.classList.add("filled");}
      else direct.push({item_id:r.item_id,inbound_qty:r.qty});  // 발주목록에 없는 품목=사입 등
      n++;
    }else un.push(r);
  });
  d.close();
  if(direct.length){
    await fetch(API+"/inbound/save",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({store_id:STORE,date:$("#date").value,lines:direct})});
    bumpDraft(direct.map(l=>({item_id:l.item_id,delta:l.inbound_qty})));
  }
  toast(`${n}건 적용${direct.length?` (${direct.length}건 바로 입고)`:""}`);
  if(direct.length)load();
  if(un.length)showMatch(un);
};

// 미매칭 처리 다이얼로그
function showMatch(un){
  let dlg=document.getElementById("matchDlg");
  if(dlg)dlg.remove();
  dlg=document.createElement("dialog");dlg.id="matchDlg";
  dlg.style.cssText="border:none;border-radius:16px;padding:0;width:min(520px,94vw)";
  const opts=items.map(i=>`<option value="${i.item_id}">${i.name}</option>`).join("");
  dlg.innerHTML=`<div style="padding:14px;border-bottom:1px solid var(--line);font-weight:700">미매칭 품목 처리</div>
  <div style="padding:14px;max-height:60vh;overflow:auto;display:flex;flex-direction:column;gap:14px">
  ${un.map((r,i)=>`<div data-i="${i}" style="border:1px solid var(--line);border-radius:12px;padding:10px">
    <div style="font-weight:700">${r.raw} <span style="color:var(--muted);font-weight:400">수량 ${r.qty}</span></div>
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <input class="mSearch" placeholder="🔍 품목 검색" oninput="filtSel(this)" style="flex:1;min-width:120px;font:inherit;padding:8px;border:1px solid var(--line);border-radius:9px">
      <select class="mSel" style="flex:1;min-width:140px;font:inherit;padding:8px;border:1px solid var(--line);border-radius:9px">
        <option value="">기존 품목 선택…</option>${opts}</select>
      <button class="btn" style="flex:0 0 auto;padding:8px 12px;font-size:13px" onclick="doMatch(this,${i})">매칭</button>
      <button class="btn ghost" style="flex:0 0 auto;padding:8px 12px;font-size:13px;background:#fff;color:var(--ink);border:1px solid var(--line)" onclick="doNew(this,${i})">신규 등록</button>
    </div></div>`).join("")}
  </div>
  <div style="padding:12px;border-top:1px solid var(--line);text-align:right">
    <button class="btn" style="width:auto;padding:10px 16px" onclick="matchDlg.close()">닫기</button></div>`;
  document.body.appendChild(dlg);
  dlg._un=un; dlg.showModal();
}
window.filtSel=inp=>{
  const kw=inp.value.trim().toLowerCase();
  const sel=inp.parentElement.querySelector(".mSel");
  [...sel.options].forEach(o=>{if(!o.value)return;
    o.hidden=kw&&!o.textContent.toLowerCase().includes(kw);});
  const vis=[...sel.options].filter(o=>o.value&&!o.hidden);
  if(kw&&vis.length===1)sel.value=vis[0].value;
};
window.doMatch=async(btn,i)=>{
  const dlg=document.getElementById("matchDlg"), r=dlg._un[i];
  const sel=btn.parentElement.querySelector(".mSel");
  if(!sel.value){toast("품목을 선택하세요",1);return;}
  btn.disabled=true;
  await fetch(API+"/items/alias",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({item_id:+sel.value,alias:r.raw})});
  const c=document.querySelector(`#items .card[data-id="${sel.value}"]`);
  if(c){c.querySelector(".qty").value=r.qty;c.classList.add("filled");}
  else{
    await fetch(API+"/inbound/save",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({store_id:STORE,date:$("#date").value,lines:[{item_id:+sel.value,inbound_qty:r.qty}]})});
    bumpDraft([{item_id:+sel.value,delta:r.qty}]);
  }
  btn.textContent="완료";toast("매칭 저장 — 다음부터 자동 인식");
};
window.doNew=async(btn,i)=>{
  const dlg=document.getElementById("matchDlg"), r=dlg._un[i];
  btn.disabled=true;
  const res=await fetch(API+"/items",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:r.raw,stock_unit:"ea"})}).then(x=>x.json());
  btn.textContent="등록됨";toast("신규 품목 등록 (품목 관리에서 상세 수정)");
  await load();
  const id=(res[0]||res).item_id;
  const c=document.querySelector(`.card[data-id="${id}"]`);
  if(c){c.querySelector(".qty").value=r.qty;c.classList.add("filled");}
};

init();
</script>
</body>
</html>
