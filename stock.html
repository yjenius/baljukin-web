<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>발주왕 · 재고 입력</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#12211c;--paper:#f6f4ec;--card:#fff;--green:#1f7a4d;--green-d:#155f3b;
    --line:#dcd8cb;--muted:#6b7169;--warn:#c23b2b;--warn-bg:#fbe9e6;
    --shadow:0 1px 0 rgba(0,0,0,.04),0 8px 24px -18px rgba(18,33,28,.45)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:"Noto Sans KR",system-ui,sans-serif;padding-bottom:120px}
  .num{font-family:"Archivo","Noto Sans KR",sans-serif;font-variant-numeric:tabular-nums}
  header{position:sticky;top:0;z-index:20;background:var(--ink);color:#eef2ec;padding:12px 14px;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand b{font-family:"Archivo";font-weight:800;font-size:19px;letter-spacing:-.5px}
  .brand span{font-size:12px;color:#9fb3a6}
  .ctrls{display:flex;gap:8px;margin-top:10px}
  select,.dateinput,.search{background:#1b2f28;color:#eef2ec;border:1px solid #2c463c;
    border-radius:11px;padding:10px 12px;font-size:15px;font-family:inherit}
  select,.dateinput{flex:1;min-width:0}
  .search{width:100%;margin-top:8px}
  .chips{display:flex;gap:6px;overflow-x:auto;margin-top:8px;padding-bottom:2px}
  .chip{white-space:nowrap;font-size:13px;padding:6px 12px;border-radius:999px;
    background:#1b2f28;color:#cfe0d6;border:1px solid #2c463c;cursor:pointer}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green)}
  .prog{font-size:12px;color:#9fb3a6;margin-top:8px}

  main{max-width:680px;margin:0 auto;padding:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;
    margin-bottom:8px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto;gap:8px 12px;align-items:center}
  .card.out{border-color:var(--warn);background:var(--warn-bg)}
  .card.filled{border-color:var(--green)}
  .name{font-weight:700;font-size:16px}
  .meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
  .tag{background:#eef2ea;color:var(--green-d);padding:2px 7px;border-radius:999px}
  .qtywrap{display:flex;align-items:center;gap:6px}
  .qty{width:96px;text-align:right;border:1px solid var(--line);border-radius:11px;
    padding:11px;font-size:21px;font-weight:700;background:#fbfaf5}
  .qty:focus{outline:2px solid var(--green);border-color:var(--green)}
  .u{font-size:13px;color:var(--muted);min-width:26px}
  .out .qty{opacity:.4}
  .stockout{grid-column:1 / -1;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
  .stockout input{width:19px;height:19px;accent-color:var(--warn)}

  .bar{position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:linear-gradient(180deg,rgba(246,244,236,0),var(--paper) 28%);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom))}
  .bar .inner{max-width:680px;margin:0 auto;display:flex;gap:8px}
  .btn{flex:1;border:none;border-radius:13px;padding:15px;font-family:"Archivo";font-weight:700;
    font-size:16px;background:var(--green);color:#fff;cursor:pointer;box-shadow:var(--shadow)}
  .btn:disabled{background:#9fb0a6}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);flex:0 0 auto;padding:15px 18px}

  /* 결과 */
  .grp{margin:16px 2px 8px;font-size:13px;font-weight:700;color:var(--muted);
    display:flex;justify-content:space-between;align-items:center}
  .grp .sup{color:var(--ink);font-size:15px}
  .slip{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
    padding:12px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:6px 10px;align-items:center}
  .slip .nm{font-weight:700}
  .slip .sub{font-size:12px;color:var(--muted)}
  .oqty{width:78px;text-align:right;border:1px solid var(--line);border-radius:10px;padding:9px;
    font-size:18px;font-weight:800;background:#fbfaf5;color:var(--green-d);font-family:"Archivo"}
  .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px}
  .badge.manual{background:var(--warn-bg);color:var(--warn)}
  .msg{text-align:center;color:var(--muted);padding:36px 16px}
  .toast{position:fixed;left:50%;bottom:130px;transform:translateX(-50%);background:var(--ink);
    color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;opacity:0;transition:.25s;z-index:40}
  .toast.show{opacity:1;bottom:140px}
  .toast.err{background:var(--warn)}
  .hidden{display:none}
  .link{color:#9fb3a6;font-size:13px;text-decoration:underline;cursor:pointer;margin-left:auto}
</style>
</head>
<body>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const sbA=createClient("https://uisdezsmyknmwayexhbu.supabase.co","sb_publishable_18Z8F9WYbJkbmFGIumZdKA_f6YGy9po");
const {data:{session}}=await sbA.auth.getSession();
if(!session)location.href="index.html";
window.sbAuth=sbA;
</script>


<header>
  <div class="brand"><b>발주왕</b><span id="viewLabel">마감 재고 입력</span>
    <span class="link" id="loadOrder">오늘 발주 불러오기</span></div>
  <div class="ctrls">
    <select id="store" style="display:none"></select>
    <input class="dateinput" type="date" id="date" style="flex:1">
  </div>
  <input class="search" id="search" placeholder="🔍 품목 검색" autocomplete="off">
  <div class="chips" id="chips"></div>
  <div class="prog" id="prog"></div>
</header>

<main id="inputView"><div id="items" class="msg">불러오는 중…</div></main>
<main id="resultView" class="hidden"><div id="results"></div></main>

<div class="bar">
  <div class="inner" id="barInput">
    <button class="btn ghost" id="tempBtn">임시저장</button>
    <button class="btn" id="calcBtn">발주 계산하기</button>
  </div>
  <div class="inner hidden" id="barResult">
    <button class="btn ghost" id="backBtn">재고 수정</button>
    <button class="btn" id="orderBtn">발주하기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API="https://baljuking.onrender.com";
const $=s=>document.querySelector(s);
let items=[], filterPart="전체", lastResults=[];

function toast(t,err){const e=$("#toast");e.textContent=t;e.className="toast show"+(err?" err":"");
  clearTimeout(e._t);e._t=setTimeout(()=>e.className="toast",2400);}
function today(){return new Date().toISOString().slice(0,10);}
function draftKey(){return `draft:${$("#store").value}:${$("#date").value}`;}

async function init(){
  $("#date").value=today();
  try{
    const [stores,its]=await Promise.all([
      fetch(API+"/stores").then(r=>r.json()),
      fetch(API+"/items").then(r=>r.json())]);
    $("#store").innerHTML=stores.map(s=>`<option value="${s.store_id}">${s.name}</option>`).join("");
    items=its;                                  // item_id 순 = 엑셀 순
    items.sort((a,b)=>(parseFloat(a.location)||9999)-(parseFloat(b.location)||9999));
    buildChips(); renderItems();
  }catch(e){ $("#items").innerHTML="서버에 연결하지 못했어요.<br>무료 서버는 첫 접속 시 최대 1분 걸려요. 잠시 뒤 새로고침 해주세요."; }
}

function buildChips(){
  const ps=["전체",...[...new Set(items.map(i=>i.part||"기타"))]];
  $("#chips").innerHTML=ps.map(p=>`<div class="chip${p==="전체"?" on":""}" data-p="${p}">${p}</div>`).join("");
  $("#chips").querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
    filterPart=c.dataset.p;
    $("#chips").querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c));
    applyFilter();
  });
}

function renderItems(){
  const draft=JSON.parse(localStorage.getItem(draftKey())||"{}");
  $("#items").className="";
  $("#items").innerHTML=items.map(i=>{
    const d=draft[i.item_id]||{};
    const st=i.storage||i.zone||"기타";
    const pt=i.part||"기타";
    return `<div class="card" data-id="${i.item_id}" data-name="${i.name}" data-p="${pt}">
      <div>
        <div class="name">${i.name}</div>
        <div class="meta"><span class="tag">${pt}</span>${st?`<span>${st}</span>`:""}${i.location?`<span>위치 ${i.location}</span>`:""}</div>
      </div>
      <div class="qtywrap">
        <input class="qty num" inputmode="decimal" placeholder="—" value="${d.qty??""}" aria-label="${i.name}">
        <span class="u">${i.stock_unit}</span>
      </div>
      <div class="stockout"><input type="checkbox" id="so${i.item_id}" ${d.so?"checked":""}>
        <label for="so${i.item_id}">결품(재고 없음)</label></div>
    </div>`;
  }).join("");

  $("#items").querySelectorAll(".card").forEach(c=>{
    const qty=c.querySelector(".qty"), so=c.querySelector('input[type=checkbox]');
    const upd=()=>{c.classList.toggle("filled",qty.value.trim()!==""||so.checked);autosave();updProg();};
    qty.addEventListener("input",upd);
    so.addEventListener("change",()=>{if(so.checked)qty.value="0";c.classList.toggle("out",so.checked);upd();});
    if(so.checked)c.classList.add("out");
    if(qty.value.trim()!=="")c.classList.add("filled");
  });
  applyFilter(); updProg();
}

function applyFilter(){
  const kw=$("#search").value.trim().toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    const okP=filterPart==="전체"||c.dataset.p===filterPart;
    const okK=!kw||c.dataset.name.toLowerCase().includes(kw);
    c.style.display=(okP&&okK)?"":"none";
  });
}
$("#search").addEventListener("input",applyFilter);

function updProg(){
  const cards=[...document.querySelectorAll(".card")];
  const done=cards.filter(c=>c.classList.contains("filled")).length;
  $("#prog").textContent=`입력 ${done} / ${cards.length}  ·  안 센 품목은 어제 재고로 자동 처리돼요`;
}

function collect(){
  return [...document.querySelectorAll(".card")].map(c=>{
    const v=c.querySelector(".qty").value.trim();
    const so=c.querySelector('input[type=checkbox]').checked;
    return {item_id:+c.dataset.id, qty:v, so};
  });
}
function autosave(){
  const d={};
  collect().forEach(x=>{if(x.qty!==""||x.so)d[x.item_id]={qty:x.qty,so:x.so};});
  localStorage.setItem(draftKey(),JSON.stringify(d));
}

$("#tempBtn").onclick=()=>{autosave();toast("임시저장했어요 (이 기기에서 이어서 가능)");};
$("#store").onchange=renderItems;
$("#date").onchange=renderItems;

$("#calcBtn").onclick=async()=>{
  const btn=$("#calcBtn");btn.disabled=true;btn.textContent="계산 중…";
  autosave();
  const lines=collect().map(x=>({
    item_id:x.item_id,
    stock_qty: x.so?0:(x.qty===""?null:parseFloat(x.qty)),
    is_stockout:x.so
  }));
  try{
    const res=await fetch(API+"/stock-submit",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({store_id:+$("#store").value,date:$("#date").value,lines})}).then(r=>r.json());
    lastResults=res; showResults(res);
  }catch(e){toast("계산 실패 — 잠시 뒤 다시",1);}
  finally{btn.disabled=false;btn.textContent="발주 계산하기";}
};

function showResults(list){
  $("#viewLabel").textContent="발주 확인";
  $("#inputView").classList.add("hidden");$("#resultView").classList.remove("hidden");
  $("#barInput").classList.add("hidden");$("#barResult").classList.remove("hidden");
  $("#search").classList.add("hidden");$("#chips").classList.add("hidden");$("#prog").classList.add("hidden");

  // 발주 필요한 것만, 발주처별 그룹
  const need=list.filter(r=>r.status==="MANUAL"||r.order_qty>0);
  if(!need.length){$("#results").innerHTML="<div class='msg'>지금 발주할 품목이 없어요. 재고가 충분합니다 👍</div>";
    window.scrollTo(0,0);return;}
  const groups={};
  need.forEach(r=>{const s=r.supplier||"미지정";(groups[s]=groups[s]||[]).push(r);});
  $("#results").innerHTML=Object.entries(groups).map(([sup,rows])=>{
    const body=rows.map(r=>{
      const manual=r.status==="MANUAL";
      const q=manual?0:r.order_qty;
      return `<div class="slip">
        <div><div class="nm">${r.item_name}</div>
          <div class="sub">잔여 ${r.today_stock} ${r.stock_unit}${manual?" · 데이터 부족(직접 입력)":""}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${manual?'<span class="badge manual">수동</span>':""}
          <input class="oqty num" data-id="${r.item_id}" data-sup="${sup}" data-name="${r.item_name}"
            data-unit="${r.order_unit}" inputmode="decimal" value="${q}">
          <span class="u">${r.order_unit}</span></div>
      </div>`;
    }).join("");
    return `<div class="grp"><span class="sup">📦 ${sup}</span><span>${rows.length}품목</span></div>${body}`;
  }).join("");
  window.scrollTo(0,0);
}

$("#backBtn").onclick=()=>{
  $("#viewLabel").textContent="마감 재고 입력";
  $("#resultView").classList.add("hidden");$("#inputView").classList.remove("hidden");
  $("#barResult").classList.add("hidden");$("#barInput").classList.remove("hidden");
  $("#search").classList.remove("hidden");$("#chips").classList.remove("hidden");$("#prog").classList.remove("hidden");
  window.scrollTo(0,0);
};

$("#orderBtn").onclick=async()=>{
  const btn=$("#orderBtn");btn.disabled=true;btn.textContent="전송 중…";
  const lines=[...document.querySelectorAll(".oqty")].map(el=>({
    item_id:+el.dataset.id, item_name:el.dataset.name, supplier:el.dataset.sup,
    order_qty:parseFloat(el.value)||0, order_unit:el.dataset.unit
  })).filter(l=>l.order_qty>0);
  try{
    const r=await fetch(API+"/orders/save",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({store_id:+$("#store").value,date:$("#date").value,lines})}).then(r=>r.json());
    toast(`발주 저장 완료 (${r.saved}품목). 수정 후 다시 눌러도 돼요`);
    btn.textContent="발주 수정 저장";
  }catch(e){toast("저장 실패",1);btn.textContent="발주하기";}
  finally{btn.disabled=false;}
};

// 저장된 오늘 발주 불러와 수정
$("#loadOrder").onclick=async()=>{
  try{
    const rows=await fetch(`${API}/orders?store_id=${$("#store").value}&on=${$("#date").value}`).then(r=>r.json());
    if(!rows.length){toast("저장된 발주가 없어요");return;}
    lastResults=rows.map(r=>({item_id:r.item_id,item_name:r.item_name,supplier:r.supplier,
      order_qty:r.order_qty,order_unit:r.order_unit,today_stock:"-",stock_unit:"",status:"OK"}));
    showResults(lastResults);
    $("#orderBtn").textContent="발주 수정 저장";
    toast("저장된 발주를 불러왔어요");
  }catch(e){toast("불러오기 실패",1);}
};

init();
</script>
</body>
</html>
